services:
  mysql:
    image: mysql:8.0
    container_name: admin3-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: admin3
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - admin3-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: admin3-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/admin3?characterEncoding=utf8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      TZ: Asia/Shanghai
    ports:
      - "18080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - admin3-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: admin3-frontend
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    ports:
      - "18081:80"
    depends_on:
      - backend
    networks:
      - admin3-network

volumes:
  mysql_data:

networks:
  admin3-network:
    driver: bridge
